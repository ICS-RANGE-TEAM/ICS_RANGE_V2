name: ot_range_v2

services:
  plc_station_a:
    build: ./station_a/plc_a/
    cap_add:
      - NET_ADMIN
    networks:
      l1_network:
        ipv4_address: 192.168.10.10
    ports:
      - "8080:8080"

  scada_station_a:
    build: ./station_a/scada_a/
    cap_add:
      - NET_ADMIN
    depends_on:
      - plc_station_a
      - router_r1_r3
    networks:
      l1_network:
        ipv4_address: 192.168.10.20
    ports:
      - "1881:1881"
      - "48010:48010"
    volumes:
      - "./station_a/scada_a/appdata:/usr/src/app/FUXA/server/_appdata"
      - "./station_a/scada_a/appdata:/usr/src/app/FUXA/server/_db"
      - "./station_a/scada_a/appdata:/usr/src/app/FUXA/server/_images"

  plc_station_b:
    build: ./station_b/plc_b/
    cap_add:
      - NET_ADMIN
    networks:
      l2_network:
        ipv4_address: 192.168.20.10
    ports:
      - "8081:8080"

  scada_station_b:
    build: ./station_b/scada_b/
    cap_add:
      - NET_ADMIN
    depends_on:
      - plc_station_b
      - router_r2_r3
    networks:
      l2_network:
        ipv4_address: 192.168.20.20
    ports:
      - "1882:1881"
    volumes:
      - "./station_b/scada_b/appdata:/usr/src/app/FUXA/server/_appdata"
      - "./station_b/scada_b/appdata:/usr/src/app/FUXA/server/_db"
      - "./station_b/scada_b/appdata:/usr/src/app/FUXA/server/_images"

  viewer3d_station_b:
    build: ./viewer3d-station-b/
    container_name: ot_range_v2_viewer3d_station_b
    restart: unless-stopped
    depends_on:
      - plc_station_b
    networks:
      l2_network:
        ipv4_address: 192.168.20.90
    ports:
      - "8090:8090"
    environment:
      PLC_HOST: 192.168.20.10
      PLC_PORT: 502
    volumes:
      - "./runtime-assets/viewer3d-station-b/electrical_substation:/app/static/assets/extracted/electrical_substation:ro"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scada_scentral:
    build: ./scada_central/
    cap_add:
      - NET_ADMIN
    depends_on:
      - router_r1_r3
      - router_r2_r3
    networks:
      l3_network:
        ipv4_address: 192.168.30.10
    ports:
      - "1884:1881"
      - "48011:48010"
    volumes:
      - "./scada_central/appdata:/usr/src/app/FUXA/server/_appdata"
      - "./scada_central/appdata:/usr/src/app/FUXA/server/_db"
      - "./scada_central/appdata:/usr/src/app/FUXA/server/_images"

  ews:
    build: ./ews/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      l3_network:
        ipv4_address: 192.168.30.20
    ports:
      - "6080:6080"
      - "2222:22"

  kali_attacker:
    build: ./kali-attacker/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      l3_network:
        ipv4_address: 192.168.30.30
    ports:
      - "6081:6080"
      - "2221:22"
      - "5000:5000"
    sysctls:
      - net.ipv4.ip_forward=1

  portal:
    build: ./portal/
    container_name: ot_range_v2_portal
    networks:
      l3_network:
        ipv4_address: 192.168.30.60
    ports:
      - "3000:3000"
    volumes:
      - "./portal/data:/data"
    restart: unless-stopped

  router_r1_r3:
    build: ./router1/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      l1_network:
        ipv4_address: 192.168.10.254
      l3_network:
        ipv4_address: 192.168.30.254
    ports:
      - "1444:5443"
    environment:
      HEDGEHOG_ENABLE: "true"
      HEDGEHOG_LOCAL_IP: 192.168.30.254
      HEDGEHOG_REMOTE_IP: 192.168.30.50
      HEDGEHOG_TUNNEL_KEY: "101"
      HEDGEHOG_TUNNEL_IFACE: gretap_l1

  router_r2_r3:
    build: ./router2/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      l2_network:
        ipv4_address: 192.168.20.254
      l3_network:
        ipv4_address: 192.168.30.253
    ports:
      - "1443:5443"
    environment:
      HEDGEHOG_ENABLE: "true"
      HEDGEHOG_LOCAL_IP: 192.168.30.253
      HEDGEHOG_REMOTE_IP: 192.168.30.50
      HEDGEHOG_TUNNEL_KEY: "102"
      HEDGEHOG_TUNNEL_IFACE: gretap_l2

  ot_sensor:
    build: ./sensor_l3/
    container_name: ot_range_v2_ot_sensor
    hostname: ot-sensor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      l3_network:
        ipv4_address: 192.168.30.50
    environment:
      SENSOR_L3_IP: 192.168.30.50
      SENSOR_BRIDGE: br-mirror
      L1_REMOTE_IP: 192.168.30.254
      L1_TUNNEL_KEY: "101"
      L1_TUNNEL_IFACE: mirror_l1
      L2_REMOTE_IP: 192.168.30.253
      L2_TUNNEL_KEY: "102"
      L2_TUNNEL_IFACE: mirror_l2
    volumes:
      - "./sensor_l3/data/suricata:/sensor-logs/suricata"
      - "./sensor_l3/data/zeek:/sensor-logs/zeek"
      - "./sensor_l3/data/pcap:/sensor-pcap"
    restart: unless-stopped

networks:
  l1_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24

  l2_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/24

  l3_network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.30.0/24
