<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Register - Firewall UI</title>
  <style>
    :root {
      --cyber-bg: #0a1628;
      --cyber-bg-light: #0d1f35;
      --cyber-bg-card: #0f2847;
      --cyber-border: #1a4a6e;
      --cyber-cyan: #00d4ff;
      --cyber-cyan-dim: #00a8cc;
      --cyber-green: #00ff88;
      --cyber-red: #ff3366;
      --cyber-orange: #ff9500;
      --cyber-text: #e0f4ff;
      --cyber-text-dim: #7aa3c0;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--cyber-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: var(--cyber-bg-card);
      border: 1px solid var(--cyber-border);
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 
        0 0 40px rgba(0, 255, 136, 0.1),
        inset 0 1px 0 rgba(0, 255, 136, 0.1);
      position: relative;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyber-green), transparent);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-icon {
      width: 60px;
      height: 60px;
      border: 2px solid var(--cyber-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      position: relative;
    }

    .login-icon::before {
      content: '';
      position: absolute;
      inset: -6px;
      border: 1px solid var(--cyber-border);
      border-radius: 50%;
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
      color: var(--cyber-green);
    }

    .login-title {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--cyber-green);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyber-text-dim);
      letter-spacing: 1px;
    }

    .alert-cyber {
      background: rgba(255, 51, 102, 0.1);
      border: 1px solid var(--cyber-red);
      border-radius: 4px;
      color: var(--cyber-red);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
    }

    .alert-cyber.alert-success {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--cyber-green);
      color: var(--cyber-green);
    }

    .alert-cyber.alert-danger {
      background: rgba(255, 51, 102, 0.1);
      border-color: var(--cyber-red);
      color: var(--cyber-red);
    }

    .alert-cyber.alert-warning {
      background: rgba(255, 149, 0, 0.1);
      border-color: var(--cyber-orange);
      color: var(--cyber-orange);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyber-text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      display: block;
    }

    .form-control-cyber {
      width: 100%;
      background: var(--cyber-bg);
      border: 1px solid var(--cyber-border);
      border-radius: 4px;
      color: var(--cyber-text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 0.875rem 1rem;
      transition: all 0.3s ease;
    }

    .form-control-cyber:focus {
      outline: none;
      border-color: var(--cyber-green);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
      background: var(--cyber-bg-light);
    }

    .form-control-cyber::placeholder {
      color: var(--cyber-text-dim);
      opacity: 0.5;
    }

    .btn-cyber {
      width: 100%;
      background: linear-gradient(135deg, var(--cyber-green) 0%, #00cc6a 100%);
      border: none;
      border-radius: 4px;
      color: var(--cyber-bg);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-cyber:hover {
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      transform: translateY(-2px);
    }

    .btn-cyber:active {
      transform: translateY(0);
    }

    .btn-cyber::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-cyber:hover::after {
      left: 100%;
    }

    .btn-link-cyber {
      background: transparent;
      border: 1px solid var(--cyber-border);
      border-radius: 4px;
      color: var(--cyber-text-dim);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      text-align: center;
    }

    .btn-link-cyber:hover {
      color: var(--cyber-cyan);
      border-color: var(--cyber-cyan);
    }

    .login-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--cyber-border);
      text-align: center;
    }

    .login-footer-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cyber-text-dim);
    }

    .login-footer-text a {
      color: var(--cyber-cyan);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .login-footer-text a:hover {
      color: var(--cyber-green);
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    .actions-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-top: 1.5rem;
    }

    .actions-row .btn-cyber {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </div>
        <h1 class="login-title">New Account</h1>
        <p class="login-subtitle">Create Administrator Access</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert-cyber alert-{{ cat }}" role="alert">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input name="username" class="form-control-cyber" placeholder="Choose a username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control-cyber" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input name="confirm_password" type="password" class="form-control-cyber" placeholder="Confirm password" required>
        </div>
        <div class="actions-row">
          <button type="submit" class="btn-cyber">Create Account</button>
          <a href="{{ url_for('login') }}" class="btn-link-cyber">Cancel</a>
        </div>
      </form>

      <div class="login-footer">
        <p class="login-footer-text">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
